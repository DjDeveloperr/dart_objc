name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          xcodebuild -version
          dart --version
          flutter --version

      - name: Verify repository
        run: ./tool/verify.sh

      - name: Check root worktree is clean
        run: git diff --exit-code && test -z "$(git status --short)"

      - name: Check nested ffigen worktree is clean
        run: |
          git -C ffigen diff --exit-code
          test -z "$(git -C ffigen status --short)"
